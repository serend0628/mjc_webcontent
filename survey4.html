<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        background-color: aliceblue;

        font-family: "휴먼편지체", "Comic Sans MS", cursive, sans-serif;
        font-size: 1em;
        line-height: 1.6;
        font-weight: 400;
    }

    h2 {
        color: brown;
        text-align: center;
        font-size: 28px;
        font-family: 'gothic A1', sans-serif;
    }

    form {
        background-color: pink;
    }
    input{
        accent-color: #007bff
    }

    footer {
        background-color: orange;
        border-radius: 8px;
        padding: 0 15px;
    }
</style>

<body>

    <h2>설문지</h2>
    <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>

    <hr>
    <hr>

    <form>
        학년
        <input type="radio" name="grade" value="1" checked>1학년
        <input type="radio" name="grade" value="2">2학년
        <input type="radio" name="grade" value="3">3학년<br><br>

        성별
        <input type="radio" name="gender" value="male">남
        <input type="radio" name="gender" value="female">여<br><br>

        관심 분야
        <select name="field">
            <option>모바일 소프트웨어</option>
            <option>AI 인공지능</option>
            <option>데이터베이스</option>
        </select><br><br>

        진로
        <input type="checkbox" checked>개발
        <input type="checkbox">기획
        <input type="checkbox">영업
        <input type="checkbox">창업<br><br>

        남기고 싶은 말<textarea rows="5" cols="40" placeholder="글을 남겨주세요"></textarea>
    </form>
    <footer>
        <p>Copyright 2026 by MOYNGJI COLLEGE</p>
    </footer>


</body>

</html>
