<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버튼이 있는 입력폼</title>
</head>
<body>
    <h3>버튼을 만들자</h3>
    <hr>
    <form>
        검색: <input type="text" size="10" value="">
            <input type="button" value="Q1">
            <button type="button">Q2</button>
        submit버튼 : <input type="submit" value="전송1">
                <button type="submit">전송2</button>
        reset버튼 : <input type="reset" value="리셋">
                <button type="reset">리셋2</button>
        이미지 버튼: <input type="image" src="https://www.w3.org/html/logo/downloads/HTML5_Logo_512.png" alt="이미지 버튼" width="50" height="50">
                    <button type="button">
                        <img src="https://www.w3.org/html/logo/downloads/HTML5_Logo_512.png" alt="이미지 버튼"  width="50" height="50">
                    </button>
    </form>
</body>
</html>
