<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>도형 서식 폼 만들기</title>
</head>

<body>

    <h2>도형 서식 폼 만들기</h2>
    <hr>

    <fieldset>
        <legend>도형 서식 입력</legend>

        <label for="line-type">선종류</label>
        <select id="line-type" size="3">
            <option>선없음</option>
            <option selected>실선</option>
            <option>점선</option>
        </select>


        <article>
            <label for="line-width">선두께</label>
            <input type="text" id="line-width">
            <label for="line-color">선색</label>
            <input type="color" value="#33b5e5">
        </article>

        <label for="opacity">투명도(0~100) :</label>
        <input type="range" min="0" max="100" value="70">
    </fieldset>

</body>

</html>
